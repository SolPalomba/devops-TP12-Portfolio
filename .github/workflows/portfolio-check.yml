# ============================================
# portfolio-check.yml — Valida el portfolio
# TP12 — DevOps Portfolio Final
# ============================================

name: Portfolio Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validar Portfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar README existe
        run: |
          if [ ! -f README.md ]; then
            echo "ERROR: README.md no encontrado"
            exit 1
          fi
          echo "README.md encontrado"

      - name: Verificar secciones del README
        run: |
          ERRORS=0
          for section in "Stack tecnológico" "Proyectos por TP" "Fundamentos" "Contenedores" "Kubernetes"; do
            if grep -q "$section" README.md; then
              echo "  [OK] Sección: $section"
            else
              echo "  [FAIL] Sección faltante: $section"
              ERRORS=$((ERRORS+1))
            fi
          done
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Verificar links a repositorios
        run: |
          ERRORS=0
          for repo in devops-TP01 devops-TP02 devops-gitflow devops-TP04 devops-TP05 devops-TP06 devops-TP08 devops-TP09 devops-TP10 devops-TP11; do
            if grep -q "$repo" README.md; then
              echo "  [OK] Link: $repo"
            else
              echo "  [FAIL] Link faltante: $repo"
              ERRORS=$((ERRORS+1))
            fi
          done
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Verificar repositorios en GitHub
        run: |
          ERRORS=0
          for repo in devops-TP01 devops-TP02 devops-gitflow devops-TP04 devops-TP05 devops-TP06 devops-TP08 devops-TP09 devops-TP10 devops-TP11; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://github.com/SolPalomba/$repo)
            if [ "$STATUS" = "200" ]; then
              echo "  [OK] Repo accesible: $repo"
            else
              echo "  [FAIL] Repo no accesible: $repo (HTTP $STATUS)"
              ERRORS=$((ERRORS+1))
            fi
          done
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Generar resumen del portfolio
        run: |
          echo "### Portfolio Check completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| README.md | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Secciones | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Links a repos | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Repos accesibles | OK |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**11 repositorios verificados**" >> $GITHUB_STEP_SUMMARY
